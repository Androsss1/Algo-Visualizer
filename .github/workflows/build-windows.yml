name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: git config --global core.autocrlf input

      - name: Build runnable JAR (Windows natives)
        run: ./gradlew.bat fatJar

      - name: Build Windows MSI installer
        run: ./gradlew.bat createMsi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuiAlgo-windows-jar
          path: build/libs/GuiAlgo-*.jar
          if-no-files-found: error

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuiAlgo-windows-msi
          path: build/compose/binaries/main/msi/*.msi
          if-no-files-found: ignore
